```html
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Employee Management Form</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body>

<div class="container">
    <h2 class="text-center">Employee Management Form</h2>

    <form id="empForm">

        <div class="form-group">
            <label>Employee ID</label>
            <input type="text"
                   class="form-control"
                   id="empId"
                   onchange="getEmployee();">
        </div>

        <div class="form-group">
            <label>Employee Name</label>
            <input type="text"
                   class="form-control"
                   id="empName">
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="number"
                   class="form-control"
                   id="salary">
        </div>

        <div class="form-group">
            <label>HRA</label>
            <input type="number"
                   class="form-control"
                   id="hra">
        </div>

        <div class="form-group">
            <label>DA</label>
            <input type="number"
                   class="form-control"
                   id="da">
        </div>

        <div class="form-group">
            <label>Deduction</label>
            <input type="number"
                   class="form-control"
                   id="deduction">
        </div>

        <button type="button"
                class="btn btn-success"
                id="saveBtn"
                onclick="saveData();">
            Save
        </button>

        <button type="button"
                class="btn btn-primary"
                id="changeBtn"
                onclick="changeData();">
            Change
        </button>

        <button type="button"
                class="btn btn-danger"
                id="resetBtn"
                onclick="resetForm();">
            Reset
        </button>

    </form>
</div>

<script>

var jpdbBaseURL = "http://api.login2explore.com:5577";
var connToken = "90935152|-31949241181161973|90958662";

var dbName = "EMPLOYEE";
var relName = "EMPLOYEE-REL";

var recNo = null;

function disableAll() {

    $("#empName").prop("disabled", true);
    $("#salary").prop("disabled", true);
    $("#hra").prop("disabled", true);
    $("#da").prop("disabled", true);
    $("#deduction").prop("disabled", true);

    $("#saveBtn").prop("disabled", true);
    $("#changeBtn").prop("disabled", true);
    $("#resetBtn").prop("disabled", true);
}

function enableFields() {

    $("#empName").prop("disabled", false);
    $("#salary").prop("disabled", false);
    $("#hra").prop("disabled", false);
    $("#da").prop("disabled", false);
    $("#deduction").prop("disabled", false);
}

function resetForm() {

    $("#empId").val("");
    $("#empName").val("");
    $("#salary").val("");
    $("#hra").val("");
    $("#da").val("");
    $("#deduction").val("");

    $("#empId").prop("disabled", false);

    disableAll();

    $("#empId").focus();
}

function validateData() {

    if ($("#empId").val() === "") {
        alert("Employee ID Required");
        return false;
    }

    if ($("#empName").val() === "") {
        alert("Employee Name Required");
        return false;
    }

    if ($("#salary").val() === "") {
        alert("Salary Required");
        return false;
    }

    if ($("#hra").val() === "") {
        alert("HRA Required");
        return false;
    }

    if ($("#da").val() === "") {
        alert("DA Required");
        return false;
    }

    if ($("#deduction").val() === "") {
        alert("Deduction Required");
        return false;
    }

    return true;
}

function createJsonObj() {

    return JSON.stringify({
        id: $("#empId").val(),
        name: $("#empName").val(),
        salary: $("#salary").val(),
        hra: $("#hra").val(),
        da: $("#da").val(),
        deduction: $("#deduction").val()
    });
}

function getEmployee() {

    let empId = $("#empId").val();

    let getRequest =
        createGET_BY_KEYRequest(
            connToken,
            dbName,
            relName,
            JSON.stringify({id: empId})
        );

    jQuery.ajaxSetup({async:false});

    let result =
        executeCommandAtGivenBaseUrl(
            getRequest,
            jpdbBaseURL,
            "/api/irl"
        );

    jQuery.ajaxSetup({async:true});

    let data = JSON.parse(result.data);

    if (data.rec_no === undefined) {

        enableFields();

        $("#saveBtn").prop("disabled", false);
        $("#resetBtn").prop("disabled", false);

        $("#empName").focus();

    } else {

        recNo = data.rec_no;

        $("#empName").val(data.record.name);
        $("#salary").val(data.record.salary);
        $("#hra").val(data.record.hra);
        $("#da").val(data.record.da);
        $("#deduction").val(data.record.deduction);

        enableFields();

        $("#empId").prop("disabled", true);

        $("#changeBtn").prop("disabled", false);
        $("#resetBtn").prop("disabled", false);

        $("#empName").focus();
    }
}

function saveData() {

    if (!validateData()) return;

    let putRequest =
        createPUTRequest(
            connToken,
            createJsonObj(),
            dbName,
            relName
        );

    jQuery.ajaxSetup({async:false});

    executeCommandAtGivenBaseUrl(
        putRequest,
        jpdbBaseURL,
        "/api/iml"
    );

    jQuery.ajaxSetup({async:true});

    alert("Employee Saved Successfully");

    resetForm();
}

function changeData() {

    if (!validateData()) return;

    let updateRequest =
        createUPDATERecordRequest(
            connToken,
            createJsonObj(),
            dbName,
            relName,
            recNo
        );

    jQuery.ajaxSetup({async:false});

    executeCommandAtGivenBaseUrl(
        updateRequest,
        jpdbBaseURL,
        "/api/iml"
    );

    jQuery.ajaxSetup({async:true});

    alert("Employee Updated Successfully");

    resetForm();
}

$(document).ready(function () {

    resetForm();

});
</script>

</body>
</html>
